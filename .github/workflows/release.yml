name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build all targets
        run: |
          mkdir -p dist

          cross build --target aarch64-unknown-linux-musl --release
          cp target/aarch64-unknown-linux-musl/release/slqm dist/slqm-arm64

          cross build --target armv7-unknown-linux-musleabihf --release
          cp target/armv7-unknown-linux-musleabihf/release/slqm dist/slqm-armv7

      - name: Package ipk files
        run: ./scripts/package.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum slqm-* > checksums.txt
          cd pkg
          sha256sum *.ipk >> ../checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/slqm-arm64
            dist/slqm-armv7
            dist/pkg/*.ipk
            dist/checksums.txt
