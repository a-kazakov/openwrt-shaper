name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all targets
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="$LDFLAGS" -o dist/slqm-arm64 ./cmd/slqm

          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 \
            go build -ldflags="$LDFLAGS" -o dist/slqm-armv7 ./cmd/slqm

          GOOS=linux GOARCH=mipsle GOMIPS=softfloat CGO_ENABLED=0 \
            go build -ldflags="$LDFLAGS" -o dist/slqm-mipsle ./cmd/slqm

      - name: Package ipk files
        run: ./scripts/package.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum slqm-* > checksums.txt
          cd pkg
          sha256sum *.ipk >> ../checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/slqm-arm64
            dist/slqm-armv7
            dist/slqm-mipsle
            dist/pkg/*.ipk
            dist/checksums.txt
